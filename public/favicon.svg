<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <style>
    :root { --ink: #0a0a0a; --paper: #ffffff; }
    @media (prefers-color-scheme: dark) {
      :root { --ink: #f0f0f0; --paper: #0c0c0c; }
    }
    .tile  { fill: var(--paper); stroke: var(--ink); }
    .mark  { fill: var(--ink); font-family: 'DM Serif Display', Georgia, 'Times New Roman', serif; }
    .index { fill: var(--ink); font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  </style>

  <!-- structural grid tile: square corners, heavy hairline border -->
  <rect class="tile" x="1.5" y="1.5" width="29" height="29" stroke-width="2"/>

  <!-- oversized display-serif monogram -->
  <text class="mark" x="16" y="24" font-size="26" text-anchor="middle">M</text>

  <!-- editorial corner index -->
  <text class="index" x="4" y="9" font-size="5" letter-spacing="0.3">01</text>
</svg>
